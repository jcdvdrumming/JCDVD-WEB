<div class="contacto-container">
  <div class="header-section">
    <h2 class="section-title">CONTACTO</h2>
    <p class="section-subtitle">Hablemos de música, sonido o tu próxima clase</p>
  </div>

  <div class="contacto-content">
    <div class="contact-info">
      <a href="https://wa.me/5493446517773" target="_blank" rel="noopener noreferrer" class="contact-card" style="text-decoration: none;">
        <div class="icon-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
        </div>
        <div class="card-text">
          <h4>WHATSAPP</h4>
          <p>(+54) 3446-517773</p>
        </div>
      </a>

      <a href="https://www.instagram.com/jcdvdrumming/" target="_blank" rel="noopener noreferrer" class="contact-card" style="text-decoration: none;">
        <div class="icon-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.5" y2="6.5"></line></svg>
        </div>
        <div class="card-text">
          <h4>INSTAGRAM</h4>
          <p>&#64;jcdvdrumming</p>
        </div>
      </a>

      <a href="mailto:jcdvdrumming@gmail.com" target="_blank" rel="noopener noreferrer" class="contact-card" style="text-decoration: none;">
        <div class="icon-circle">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        <div class="card-text">
          <h4>EMAIL</h4>
          <p>jcdvdrumming&#64;gmail.com</p>
        </div>
      </a>
    </div>

    <div class="contact-form">
      <div class="form-group">
        <label>TU NOMBRE</label>
        <input #nameInput type="text" placeholder="¿Cómo te llamás?">
      </div>
      
      <div class="form-group">
        <label>MENSAJE</label>
        <textarea #msgInput placeholder="Contame qué necesitás..."></textarea>
      </div>

      <button class="submit-btn" type="button" (click)="sendWhatsApp(nameInput.value, msgInput.value)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
        ENVIAR POR WHATSAPP
      </button>
    </div>
  </div>

  <footer class="site-footer">
    <span>© 2026 JCDV DRUMMING</span>
    <span>Baterista Profesional & Drum Doctor</span>
  </footer>
</div>
